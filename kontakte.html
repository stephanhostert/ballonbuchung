<!DOCTYPE html>
<!--
  ============================================================================
  BALLONFAHRT · KONTAKTE · STEFFEN HOLZBAU BALLONTEAM
  ----------------------------------------------------------------------------
  Verwaltung der Interessenten (Supabase). Login -> anlegen / bearbeiten /
  löschen. Mit Flags (mehrere pro Kontakt) zum Filtern.
  © Stephan Hostert
  ============================================================================
-->
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Kontakte · Steffen Holzbau Ballonteam</title>
<style>
  :root{
    --bg:#f3efe7;--surface:#ffffff;--surface-2:#faf7f0;--ink:#26241f;--ink-soft:#5c574d;
    --ink-faint:#928c7e;--line:#e4ddcd;--line-soft:#eee8da;--brand:#00a6e2;--brand-dark:#0a7da9;
    --brand-soft:#daeefa;--wood:#898a7c;--anthra:#262420;--pos:#3f7d4f;--pos-soft:#e6efe5;
    --neg:#bf3a2b;--neg-soft:#f6e3df;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,"Liberation Mono",monospace;
    --shadow:0 1px 2px rgba(38,33,22,.05),0 10px 28px rgba(38,33,22,.07);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--sans);color:var(--ink);background:var(--bg);min-height:100vh;line-height:1.55;-webkit-font-smoothing:antialiased;}
  .brandbar{height:4px;background:linear-gradient(90deg,var(--brand) 0%,var(--brand) 62%,var(--anthra) 62%);}
  .topbar{background:var(--anthra);color:#fff;}
  .topbar-in{max-width:900px;margin:0 auto;padding:15px max(22px,env(safe-area-inset-left));display:flex;align-items:center;justify-content:space-between;gap:16px;}
  .wordmark{display:flex;align-items:center;gap:12px;}
  .wm-logo{width:42px;height:42px;flex:none;border-radius:7px;overflow:hidden;display:block;object-fit:cover;box-shadow:0 0 0 1px rgba(255,255,255,.18);}
  .wm-name{font-weight:800;font-size:1.04rem;letter-spacing:.13em;}
  .wm-name span{color:var(--brand);}
  .wm-tag{font-weight:700;font-size:.6rem;letter-spacing:.34em;color:#b6b6a6;margin-top:4px;}
  .topbar-right{display:flex;align-items:center;gap:14px;font-size:.8rem;color:#b7b09f;flex-wrap:wrap;justify-content:flex-end;}
  .topbar-right a{color:#cfc9bb;text-decoration:none;border-bottom:1px solid #44413a;}
  .topbar-right a:hover{color:#fff;border-color:var(--brand);}
  .topbar-right button{background:none;border:1px solid #44413a;color:#cfc9bb;border-radius:6px;padding:6px 11px;cursor:pointer;font-size:.78rem;}
  .wrap{max-width:900px;margin:0 auto;padding:30px max(22px,env(safe-area-inset-left)) 60px;}
  .hero{margin-bottom:22px;display:flex;justify-content:space-between;align-items:flex-end;gap:16px;flex-wrap:wrap;}
  .kicker{font-weight:700;font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;color:var(--brand-dark);display:flex;align-items:center;gap:9px;margin-bottom:11px;}
  .kicker::before{content:"";width:26px;height:2px;background:var(--brand);}
  h1{font-weight:800;font-size:clamp(1.6rem,4vw,2.2rem);line-height:1.08;letter-spacing:-.015em;}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:22px;box-shadow:var(--shadow);}
  .card + .card{margin-top:18px;}
  .card-head{display:flex;align-items:center;gap:10px;padding-bottom:13px;margin-bottom:17px;border-bottom:1px solid var(--line-soft);}
  .card-head .bar{width:4px;height:18px;background:var(--brand);border-radius:1px;}
  .card-title{font-weight:700;font-size:1.04rem;}
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:12px;}
  .toolbar input[type=search]{flex:1;min-width:180px;}
  .formgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px 16px;}
  @media(max-width:640px){.formgrid{grid-template-columns:1fr;}}
  .field label{display:block;font-size:.78rem;font-weight:600;color:var(--ink-soft);margin-bottom:6px;}
  .field .hint{font-weight:400;color:var(--ink-faint);}
  .input-row{display:flex;align-items:stretch;}
  input,select,textarea{width:100%;font-family:var(--sans);font-size:16px;font-weight:500;color:var(--ink);background:var(--surface-2);border:1px solid var(--line);border-radius:6px;padding:10px 12px;}
  input[type=number],input[type=tel]{font-family:var(--mono);}
  textarea{min-height:64px;resize:vertical;}
  select{appearance:none;-webkit-appearance:none;cursor:pointer;padding-right:38px;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path d='M1 1l5 5 5-5' fill='none' stroke='%235c574d' stroke-width='1.6' stroke-linecap='round'/></svg>");
    background-repeat:no-repeat;background-position:right 13px center;}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--brand);background-color:#fff;box-shadow:0 0 0 3px rgba(0,166,226,.2);}
  .full{grid-column:1 / -1;}
  .check{display:flex;align-items:center;gap:10px;font-size:.9rem;font-weight:600;color:var(--ink-soft);}
  .check input{width:19px;height:19px;flex:none;accent-color:var(--brand);cursor:pointer;}
  .check .sub{font-weight:400;color:var(--ink-faint);font-size:.78rem;}
  button.cta{padding:12px 20px;font-size:.98rem;font-weight:700;color:#fff;background:var(--brand);border:none;border-radius:8px;cursor:pointer;}
  button.cta:hover{background:var(--brand-dark);}
  button.ghost{background:var(--surface);color:var(--brand-dark);border:1px solid var(--line);}
  button.ghost:hover{background:var(--surface-2);}
  .form-actions{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap;}
  /* Flags */
  .flagbox{display:flex;flex-wrap:wrap;gap:7px;align-items:center;background:var(--surface-2);border:1px solid var(--line);border-radius:6px;padding:8px 10px;}
  .flagbox input{border:none;background:none;box-shadow:none!important;flex:1;min-width:120px;padding:2px 4px;}
  .chip{display:inline-flex;align-items:center;gap:6px;font-size:.78rem;font-weight:600;color:var(--brand-dark);background:var(--brand-soft);border:1px solid #b9def0;border-radius:20px;padding:3px 6px 3px 10px;}
  .chip b{cursor:pointer;font-weight:700;color:var(--brand-dark);opacity:.7;}
  .chip b:hover{opacity:1;}
  .flag-tag{display:inline-flex;font-size:.62rem;font-weight:700;color:var(--brand-dark);background:var(--brand-soft);border:1px solid #b9def0;border-radius:20px;padding:1px 8px;letter-spacing:.02em;}
  .filterbar{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px;align-items:center;}
  .filterbar .lbl{font-size:.74rem;color:var(--ink-faint);font-weight:600;margin-right:2px;}
  .fchip{font-size:.74rem;font-weight:600;color:var(--ink-soft);background:var(--surface-2);border:1px solid var(--line);border-radius:20px;padding:4px 11px;cursor:pointer;}
  .fchip.on{background:var(--brand);color:#fff;border-color:var(--brand);}
  /* Liste */
  .clist{display:flex;flex-direction:column;border:1px solid var(--line);border-radius:8px;overflow:hidden;}
  .crow{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--line-soft);background:var(--surface);}
  .crow:last-child{border-bottom:none;}
  .crow.inact{opacity:.55;}
  .cmain{flex:1;min-width:0;}
  .cname{font-weight:600;font-size:.95rem;display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
  .cmeta{font-size:.77rem;color:var(--ink-faint);font-family:var(--mono);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .cflags{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px;}
  .badge{font-size:.6rem;font-weight:700;padding:1px 7px;border-radius:20px;letter-spacing:.04em;text-transform:uppercase;}
  .badge.vip{color:#9a6b00;background:#fbeecb;border:1px solid #eed9a6;}
  .badge.ok{color:var(--pos);background:var(--pos-soft);border:1px solid #c4dcc1;}
  .badge.no{color:var(--neg);background:var(--neg-soft);border:1px solid #e7c2bb;}
  .crow-actions{display:flex;gap:6px;flex:none;}
  .iconbtn{width:34px;height:34px;border-radius:7px;border:1px solid var(--line);background:var(--surface-2);cursor:pointer;display:grid;place-items:center;color:var(--ink-soft);}
  .iconbtn:hover{background:#fff;border-color:var(--brand);color:var(--brand-dark);}
  .iconbtn.del:hover{border-color:#e7c2bb;color:var(--neg);}
  .iconbtn svg{width:16px;height:16px;}
  .empty{padding:22px;text-align:center;color:var(--ink-faint);font-size:.88rem;}
  .count{font-size:.82rem;color:var(--ink-soft);}
  .count b{font-family:var(--mono);color:var(--brand-dark);}
  .msg{display:flex;align-items:center;gap:11px;padding:12px 14px;border-radius:7px;margin-top:16px;font-weight:600;font-size:.88rem;}
  .msg.ok{background:var(--pos-soft);border:1px solid #c4dcc1;color:var(--pos);}
  .msg.bad{background:var(--neg-soft);border:1px solid #e7c2bb;color:var(--neg);}
  .msg.hide{display:none;}
  #editCard{display:none;}
  #login{max-width:400px;margin:8vh auto 0;}
  .hidden{display:none;}
  footer{margin-top:30px;padding-top:18px;border-top:1px solid var(--line);color:var(--ink-faint);font-size:.78rem;}
</style>
</head>

<!-- LOGIN -->
<div id="login" class="wrap">
  <div class="hero" style="justify-content:center"><h1>Kontakte-Login</h1></div>
  <div class="card">
    <div class="field" style="margin-bottom:14px"><label>E-Mail</label><input type="email" id="email" autocomplete="username"></div>
    <div class="field" style="margin-bottom:14px"><label>Passwort</label><input type="password" id="pass" autocomplete="current-password"></div>
    <div id="loginMsg" class="msg bad hide"></div>
    <button class="cta" id="loginBtn" style="width:100%">Anmelden</button>
  </div>
  <footer style="text-align:center"><b>STEFFEN HOLZBAU · BALLONTEAM</b></footer>
</div>

<!-- APP -->
<div id="app" class="wrap hidden">
  <div class="hero">
    <div><div class="kicker">Ballonteam · Interessenten</div><h1>Kontakte</h1></div>
    <button class="cta" id="newBtn">+ Neuer Kontakt</button>
  </div>

  <!-- Formular -->
  <div class="card" id="editCard">
    <div class="card-head"><span class="bar"></span><span class="card-title" id="editTitle">Neuer Kontakt</span></div>
    <input type="hidden" id="fId">
    <div class="formgrid">
      <div class="field"><label>Vorname</label><input type="text" id="fVorname"></div>
      <div class="field"><label>Name</label><input type="text" id="fName"></div>
      <div class="field"><label>Handy <span class="hint">(mit Vorwahl, z. B. +49… / +352…)</span></label><input type="tel" id="fHandy" placeholder="+352 691 000000"></div>
      <div class="field"><label>Firma <span class="hint">(optional)</span></label><input type="text" id="fFirma"></div>
      <div class="field"><label>Ort <span class="hint">(optional)</span></label><input type="text" id="fOrt"></div>
      <div class="field"><label>Gutschein-Nr. <span class="hint">(optional)</span></label><input type="text" id="fGutschein"></div>
      <div class="field"><label>Personen <span class="hint">(Plätze lt. Gutschein)</span></label><div class="input-row"><input type="number" id="fPersonen" value="1" min="1" max="8"><span style="display:flex;align-items:center;padding:0 13px;font-family:var(--mono);font-size:.8rem;color:var(--ink-faint);background:#efe8d8;border:1px solid var(--line);border-left:none;border-radius:0 6px 6px 0">Pers.</span></div></div>
      <div class="field"><label>Priorität</label>
        <select id="fPrio"><option value="1">1 – VIP / bevorzugt</option><option value="2">2 – normal</option><option value="3" selected>3 – niedrig</option></select></div>
      <div class="field full"><label>Flags <span class="hint">(Enter oder Komma zum Hinzufügen – mehrere möglich)</span></label>
        <div class="flagbox" id="flagBox">
          <input type="text" id="flagInput" list="flagList" placeholder="z. B. Sommer, kurzfristig, NW-tauglich …">
        </div>
        <datalist id="flagList"></datalist>
      </div>
      <div class="field full"><label>Bemerkung</label><textarea id="fBemerkung"></textarea></div>
      <div class="field full"><label class="check"><input type="checkbox" id="fConsent"><span>Einwilligung SMS-Empfang liegt vor <span class="sub">(nur dann bekommt der Kontakt SMS – DSGVO)</span></span></label></div>
      <div class="field full"><label class="check"><input type="checkbox" id="fAktiv" checked><span>Aktiv <span class="sub">(inaktive werden nicht angeschrieben, bleiben aber gespeichert)</span></span></label></div>
    </div>
    <div id="editMsg" class="msg bad hide"></div>
    <div class="form-actions">
      <button class="cta" id="saveBtn">Speichern</button>
      <button class="cta ghost" id="cancelBtn">Abbrechen</button>
    </div>
  </div>

  <!-- Liste -->
  <div class="card">
    <div class="toolbar">
      <input type="search" id="search" placeholder="Suchen (Name, Handy, Ort, Gutschein-Nr.)…">
      <span class="count"><b id="cCount">0</b> Kontakte</span>
    </div>
    <div class="filterbar" id="filterbar"></div>
    <div class="clist" id="clist"><div class="empty">Lädt…</div></div>
  </div>

  <footer><b>STEFFEN HOLZBAU · BALLONTEAM</b> — Kontaktverwaltung</footer>
</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
const SUPABASE_URL = "https://jorngnkbyvxkntvaadcw.supabase.co";
const SUPABASE_KEY = "sb_publishable_R7dJv2fCtG8ud3dDCaeqUQ_9BfG52EI";
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);
const $ = (id)=>document.getElementById(id);

let contacts = [];
let curFlags = [];          // Flags im offenen Formular
let filterFlags = [];       // aktive Filter-Flags in der Liste

function normPhone(raw){
  if(!raw) return "";
  let s = String(raw).replace(/[^\d+]/g,"");
  if(s.startsWith("+")) return s;
  if(s.startsWith("00")) return "+"+s.slice(2);
  if(s.startsWith("352")||s.startsWith("49")) return "+"+s;
  if(s.startsWith("0")) return "+49"+s.slice(1);
  return s;
}
function allFlags(){
  const set = new Set();
  contacts.forEach(c=>(c.flags||[]).forEach(f=>set.add(f)));
  return [...set].sort((a,b)=>a.localeCompare(b,"de"));
}

// ---- Auth ----
async function initAuth(){
  const { data:{ session } } = await sb.auth.getSession();
  if(session) showApp(session.user); else showLogin();
}
function showLogin(){ $("app").classList.add("hidden"); $("login").classList.remove("hidden"); ["logoutBtn","lnkAdmin","lnkTk"].forEach(i=>$(i).classList.add("hidden")); $("whoami").textContent=""; }
function showApp(user){ $("login").classList.add("hidden"); $("app").classList.remove("hidden"); ["logoutBtn","lnkAdmin","lnkTk"].forEach(i=>$(i).classList.remove("hidden")); $("whoami").textContent=user.email; loadContacts(); }
$("loginBtn").addEventListener("click", async ()=>{
  $("loginMsg").classList.add("hide");
  const { data, error } = await sb.auth.signInWithPassword({ email:$("email").value.trim(), password:$("pass").value });
  if(error){ $("loginMsg").textContent="Login fehlgeschlagen: "+error.message; $("loginMsg").classList.remove("hide"); return; }
  showApp(data.user);
});
$("logoutBtn").addEventListener("click", async ()=>{ await sb.auth.signOut(); showLogin(); });

// ---- Laden ----
async function loadContacts(){
  const { data, error } = await sb.from("contacts").select("*").order("name",{ascending:true});
  if(error){ $("clist").innerHTML='<div class="empty">Fehler: '+error.message+'</div>'; return; }
  contacts = data||[];
  // Datalist mit vorhandenen Flags füllen
  $("flagList").innerHTML = allFlags().map(f=>'<option value="'+f.replace(/"/g,'&quot;')+'">').join("");
  renderFilterbar();
  renderList();
}
function fmtD(d){ if(!d) return "…"; const p=d.split("-"); return p[2]+"."+p[1]+"."+p[0].slice(2); }

function renderFilterbar(){
  const bar=$("filterbar"); const flags=allFlags();
  if(!flags.length){ bar.innerHTML=""; return; }
  bar.innerHTML='<span class="lbl">Filter:</span>';
  flags.forEach(f=>{
    const b=document.createElement("button");
    b.className="fchip"+(filterFlags.includes(f)?" on":"");
    b.textContent=f;
    b.addEventListener("click",()=>{
      if(filterFlags.includes(f)) filterFlags=filterFlags.filter(x=>x!==f);
      else filterFlags.push(f);
      renderFilterbar(); renderList();
    });
    bar.appendChild(b);
  });
}
function renderList(){
  const q = ($("search").value||"").toLowerCase().trim();
  const box = $("clist"); box.innerHTML="";
  const list = contacts.filter(c=>{
    const textOk = !q || [c.name,c.vorname,c.handy,c.ort,c.gutschein_nr,c.firma].filter(Boolean).join(" ").toLowerCase().includes(q);
    const flagsOk = filterFlags.every(f=>(c.flags||[]).includes(f));   // muss ALLE aktiven Filter-Flags haben
    return textOk && flagsOk;
  });
  $("cCount").textContent = list.length;
  if(!list.length){ box.innerHTML='<div class="empty">Keine Kontakte.</div>'; return; }
  list.forEach(c=>{
    const zeit = (c.wann_von||c.wann_bis)?(fmtD(c.wann_von)+"–"+fmtD(c.wann_bis)):"jederzeit";
    const badges =
      (c.prioritaet===1?'<span class="badge vip">VIP</span>':'') +
      (c.consent?'<span class="badge ok">SMS ok</span>':'<span class="badge no">keine Einwilligung</span>');
    const flagsHtml = (c.flags||[]).length ? '<div class="cflags">'+(c.flags||[]).map(f=>'<span class="flag-tag">'+f+'</span>').join("")+'</div>' : '';
    const row=document.createElement("div");
    row.className="crow"+(c.aktiv?"":" inact");
    row.innerHTML=
      '<div class="cmain">'+
        '<div class="cname">'+(c.name||"")+', '+(c.vorname||"")+' '+badges+'</div>'+
        '<div class="cmeta">'+(c.handy||"—")+' · '+(c.personen||1)+' Pl. · Wind '+(c.wind_wunsch||"egal")+(c.ort?(' · '+c.ort):'')+'</div>'+
        flagsHtml+
      '</div>'+
      '<div class="crow-actions">'+
        '<button class="iconbtn" data-edit="'+c.id+'" title="Bearbeiten"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 20h4L18.5 9.5a2.1 2.1 0 0 0-3-3L5 17v3Z"/><path d="M13.5 6.5l3 3"/></svg></button>'+
        '<button class="iconbtn del" data-del="'+c.id+'" title="Löschen"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7h16M9 7V5h6v2M6 7l1 13h10l1-13"/></svg></button>'+
      '</div>';
    box.appendChild(row);
  });
  box.querySelectorAll("[data-edit]").forEach(b=>b.addEventListener("click",()=>openForm(contacts.find(x=>x.id===b.dataset.edit))));
  box.querySelectorAll("[data-del]").forEach(b=>b.addEventListener("click",()=>delContact(contacts.find(x=>x.id===b.dataset.del))));
}
$("search").addEventListener("input", renderList);

// ---- Flag-Eingabe im Formular ----
function renderCurFlags(){
  const box=$("flagBox");
  box.querySelectorAll(".chip").forEach(el=>el.remove());
  const inp=$("flagInput");
  curFlags.forEach(f=>{
    const chip=document.createElement("span"); chip.className="chip";
    chip.innerHTML=f.replace(/</g,"&lt;")+' <b data-x="'+f.replace(/"/g,'&quot;')+'">&times;</b>';
    box.insertBefore(chip, inp);
  });
  box.querySelectorAll(".chip b").forEach(b=>b.addEventListener("click",()=>{ curFlags=curFlags.filter(x=>x!==b.dataset.x); renderCurFlags(); }));
}
function addFlag(v){ v=(v||"").trim(); if(v && !curFlags.includes(v)) curFlags.push(v); }
$("flagInput").addEventListener("keydown",(e)=>{
  if(e.key==="Enter"||e.key===","){ e.preventDefault(); addFlag($("flagInput").value); $("flagInput").value=""; renderCurFlags(); }
  else if(e.key==="Backspace" && !$("flagInput").value && curFlags.length){ curFlags.pop(); renderCurFlags(); }
});
$("flagInput").addEventListener("blur",()=>{ if($("flagInput").value.trim()){ addFlag($("flagInput").value); $("flagInput").value=""; renderCurFlags(); } });

// ---- Formular ----
function openForm(c){
  $("editMsg").classList.add("hide");
  $("editTitle").textContent = c? "Kontakt bearbeiten" : "Neuer Kontakt";
  $("fId").value = c? c.id : "";
  $("fVorname").value = c?.vorname||"";
  $("fName").value = c?.name||"";
  $("fHandy").value = c?.handy||"";
  $("fFirma").value = c?.firma||"";
  $("fOrt").value = c?.ort||"";
  $("fGutschein").value = c?.gutschein_nr||"";
  $("fPersonen").value = c?.personen||1;
  $("fPrio").value = String(c?.prioritaet||3);
  $("fBemerkung").value = c?.bemerkung||"";
  $("fConsent").checked = !!c?.consent;
  $("fAktiv").checked = c? !!c.aktiv : true;
  curFlags = c && Array.isArray(c.flags) ? [...c.flags] : [];
  $("flagInput").value="";
  renderCurFlags();
  $("editCard").style.display="block";
  window.scrollTo({top:0,behavior:"smooth"});
}
$("newBtn").addEventListener("click", ()=>openForm(null));
$("cancelBtn").addEventListener("click", ()=>{ $("editCard").style.display="none"; });

$("saveBtn").addEventListener("click", async ()=>{
  if($("flagInput").value.trim()){ addFlag($("flagInput").value); $("flagInput").value=""; renderCurFlags(); }
  const handy = normPhone($("fHandy").value);
  if(!$("fName").value.trim() && !$("fVorname").value.trim()){ formErr("Bitte mindestens einen Namen eintragen."); return; }
  if(!handy){ formErr("Bitte eine Handynummer eintragen."); return; }
  const rec = {
    vorname:$("fVorname").value.trim()||null,
    name:$("fName").value.trim()||null,
    handy,
    firma:$("fFirma").value.trim()||null,
    ort:$("fOrt").value.trim()||null,
    gutschein_nr:$("fGutschein").value.trim()||null,
    personen:parseInt($("fPersonen").value,10)||1,
    prioritaet:parseInt($("fPrio").value,10)||3,
    flags:curFlags,
    bemerkung:$("fBemerkung").value.trim()||null,
    consent:$("fConsent").checked,
    consent_at:$("fConsent").checked?new Date().toISOString():null,
    aktiv:$("fAktiv").checked
  };
  const id = $("fId").value;
  let error;
  if(id){ ({ error } = await sb.from("contacts").update(rec).eq("id",id)); }
  else  { ({ error } = await sb.from("contacts").insert(rec)); }
  if(error){ formErr("Fehler: "+error.message); return; }
  $("editCard").style.display="none";
  await loadContacts();
});
function formErr(t){ $("editMsg").textContent=t; $("editMsg").className="msg bad"; $("editMsg").classList.remove("hide"); }

async function delContact(c){
  if(!c) return;
  if(!confirm("Kontakt "+(c.vorname||"")+" "+(c.name||"")+" wirklich löschen?")) return;
  const { error } = await sb.from("contacts").delete().eq("id",c.id);
  if(error){ alert("Löschen fehlgeschlagen: "+error.message); return; }
  await loadContacts();
}

initAuth();
</script>
</body>
</html>
